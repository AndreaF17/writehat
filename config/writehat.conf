# TOML format (https://github.com/toml-lang/toml)

[writehat]
admin_username = 'admin'
admin_password = 'PLEASECHANGETHISFORHEAVENSSAKE'
# SECURITY WARNING: keep the secret key used in production secret!
secret = 'INTHENAMEOFALLTHATISHOLYPLEASECHANGETHIS'
# Add your custom hostname here
allowed_hosts = ['localhost', '127.0.0.1', 'writehat', 'writehat.corp.local']
timezone = 'America/New_York'
# SECURITY WARNING: don't run with debug turned on in production!
debug = false
selenium_timeout = 120


[mongo]
host = 'mongo'
port = 27017
database = 'writehat'
user = 'root'
# don't forget to place a matching password in docker-compose.yml
password = 'FORTHELOVEOFGEEBUSPLEASECHANGETHIS'


[mysql]
host = 'mysql'
port = 3306
database = 'writehat'
user = 'writehat'
# don't forget to place a matching password in docker-compose.yml
password = 'CHANGETHISIFYOUAREANINTELLIGENTHUMANBEING'


[ldap]
# The URL of the LDAP server
url = 'ldap://corp.local'
# Domain
domain = 'corp.local'
# Initiate TLS on connection
tls = true
# The LDAP search base for looking up users
base = 'dc=corp,dc=local'
# The LDAP group members filter for users
# Example: 'cn=GroupA,ou=CorpUsers,dc=corp,dc=local
# Leave blank for no filter
filter = ''
# The LDAP username and password for querying the LDAP database
username = ''
password = ''


[sso]
# Enable OIDC Single Sign-On
enabled = false
# If true, GET /login redirects immediately to SSO
auto_redirect = false
# Display label for login button
display_name = 'Corporate SSO'
# OIDC client credentials
client_id = ''
client_secret = ''
# OIDC discovery endpoints (copy from your identity provider)
authorization_endpoint = ''
token_endpoint = ''
userinfo_endpoint = ''
jwks_endpoint = ''
logout_endpoint = ''
# Typical value: RS256
sign_algo = 'RS256'
verify_ssl = true
# Requested OIDC scopes
scopes = ['openid', 'email', 'profile']
# Restrict access to users in these email domains. Leave empty to allow all.
allowed_email_domains = []
require_verified_email = true
# Paths used to extract IdP roles from claims (dot notation)
role_claim_paths = ['roles', 'groups', 'realm_access.roles']
# Roles that grant Django flags
staff_roles = []
superuser_roles = []
# Default flags if no matching role is found
default_is_staff = false
default_is_superuser = false
# Keep local role flags aligned with IdP on each login
sync_role_flags = true
# Superusers are always staff in Django
staff_if_superuser = true
# Optional Django group sync from IdP claims
sync_groups = false
sync_groups_strict = false
group_claim_paths = ['groups']
# Optional map from IdP role name to Django group name
role_to_group_map = {}


[custom_components]
# Optional list of local paths for custom component packs.
# Each pack may include:
#   - components/*.py
#   - templates/**
#   - static/**
# Paths can be absolute or relative to the repository root.
paths = []
