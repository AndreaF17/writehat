<div class="border border-info rounded p-3 bg-light">
  {% if errors %}
    <div class="alert alert-danger" role="alert">
      <ul class="mb-0">
        {% for err in errors %}
          <li>{{ err }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}

  <form id="accountForm" method="POST" action="{{ form_action }}" autocomplete="off">
    {% csrf_token %}
    <table class="writehat-form">
      <tr>
        <th><label for="id_username">Username</label></th>
        <td>
          <input type="text" id="id_username" name="username" value="{{ form_data.username }}" />
        </td>
      </tr>
      <tr>
        <th><label for="id_first_name">First name</label></th>
        <td>
          <input type="text" id="id_first_name" name="first_name" value="{{ form_data.first_name }}" />
        </td>
      </tr>
      <tr>
        <th><label for="id_last_name">Last name</label></th>
        <td>
          <input type="text" id="id_last_name" name="last_name" value="{{ form_data.last_name }}" />
        </td>
      </tr>
      <tr>
        <th><label for="id_email">Email</label></th>
        <td>
          <input type="text" id="id_email" name="email" value="{{ form_data.email }}" />
        </td>
      </tr>
      <tr>
        <th><label for="id_password1">New Password</label></th>
        <td>
          <input type="password" id="id_password1" name="password1" />
          <div class="text-muted small">Leave blank to keep current password.</div>
        </td>
      </tr>
      <tr>
        <th><label for="id_password2">Confirm Password</label></th>
        <td>
          <input type="password" id="id_password2" name="password2" />
        </td>
      </tr>
    </table>
  </form>
</div>
