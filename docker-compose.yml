services:

  writehat:
    build:
      context: .
      dockerfile: ./config/Dockerfile.app
    command: bash -c "
      sleep 2 &&
      ./manage.py makemigrations writehat &&
      ./manage.py migrate writehat &&
      ./manage.py makemigrations &&
      ./manage.py migrate &&
      uwsgi --http 0.0.0.0:8000 --static-map /static=/opt/writehat/static --plugin-dir=/usr/lib/uwsgi/plugins --plugin python3 -w writehat.wsgi:application --processes=4 --master --vacuum"
    volumes:
      - .:/opt/writehat
    ports:
      - 8000:8000
    environment:
      - PYTHONPATH=/opt
    restart: unless-stopped
    depends_on:
      - mongo
      - mysql

  mongo:
    image: mongo:6.0
    volumes:
      - ./mongo/configdb:/data/configdb
      - ./mongo/db:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=FORTHELOVEOFGEEBUSPLEASECHANGETHIS
    expose:
      - 27017

  mysql:
    image: mysql:8.4
    volumes:
      - ./mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: CHANGETHISIFYOUAREANINTELLIGENTHUMANBEING
      MYSQL_DATABASE: writehat
      MYSQL_USER: writehat
      MYSQL_PASSWORD: CHANGETHISIFYOUAREANINTELLIGENTHUMANBEING
    expose:
      - 3306
    restart: unless-stopped
